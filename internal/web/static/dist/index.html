    <style>
      html, body, #term {
        width: 100%;
        height: 100dvh;
        margin: 0;
        overflow: hidden;
        background: #090b0f;
      }
      body {
        color: #d7dde8;
        font-family: Menlo, Monaco, monospace;
        -webkit-text-size-adjust: 100%;
        touch-action: none;
      }
      #term {

        padding: calc(env(safe-area-inset-top) + 44px) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #toolbar {
        position: fixed;
        top: env(safe-area-inset-top);
        left: env(safe-area-inset-left);
        right: env(safe-area-inset-right);
        height: 44px;
        z-index: 11;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        box-sizing: border-box;
        padding: 6px 10px;
        background: rgba(9, 11, 15, 0.72);
        border-bottom: 1px solid #222a38;
        backdrop-filter: blur(12px);
      }
      .control-button,
      .approval-button {
        border: 1px solid #303a4d;
        border-radius: 6px;
        background: #151a24;
        color: #d7dde8;
        font: 600 12px Menlo, Monaco, monospace;
        min-height: 30px;
      }
      .control-button {
        min-width: 54px;

      .approval-button {

        border-color: #388bfd;
        color: #fff;
      }
      .approval-button.danger {
        background: #6e1f25;

      }
      #approval-overlay {
        position: fixed;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 10;
        display: grid;
        gap: 8px;
        max-height: 60dvh;
        overflow-y: auto;
        overscroll-behavior: contain;
      }
      .approval-card {

        border-radius: 8px;
        background: rgba(13, 17, 23, 0.96);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
        padding: 10px;
        animation: approval-slide-in 160ms ease-out;
      }
      .approval-card.risk-high {
        border-color: #da3633;
      }
      .approval-header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px 8px;
        align-items: center;
      }
      .approval-title {
        font: 700 13px Menlo, Monaco, monospace;
        color: #f0f3f6;
      }
      .approval-meta {
        grid-column: 1;
        color: #8d98aa;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .approval-risk {
        grid-column: 2;
        grid-row: 1 / span 2;
        border: 1px solid #303a4d;
        border-radius: 999px;
        padding: 3px 7px;
        color: #d7dde8;
        font-size: 11px;
      }
      .approval-input {
        max-height: 26dvh;
        overflow: auto;
        margin: 10px 0;
        padding: 8px;
        background: #05070a;
        border: 1px solid #202632;
        border-radius: 6px;
        color: #d7dde8;
        font-size: 12px;
        line-height: 1.45;
      }
      .approval-line {
        display: grid;
        grid-template-columns: 3ch 1fr;
        gap: 8px;
      }
      .approval-line-no {
        color: #697386;
        text-align: right;
        user-select: none;
      }
      .approval-line code {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .approval-actions,
      .approval-edit {
        display: flex;
        gap: 8px;
      }
      .approval-edit {
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .approval-edit[hidden] {
        display: none;
      }
      .approval-edit textarea {
        flex: 1 0 100%;
        min-height: 120px;
        box-sizing: border-box;
        border: 1px solid #303a4d;
        border-radius: 6px;
        background: #05070a;
        color: #d7dde8;
        font: 12px Menlo, Monaco, monospace;
        padding: 8px;
      }
      .approval-status {
        min-height: 16px;
        margin-top: 6px;
        color: #8d98aa;
        font-size: 11px;
      }
      @keyframes approval-slide-in {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .approval-card {
          animation: none;
        }
      }
      #splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #090b0f;
        color: #8d98aa;
        font-size: 14px;
        z-index: 2;
      }
      #splash[hidden] {
        display: none;
      }

</html>
