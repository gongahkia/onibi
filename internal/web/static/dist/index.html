      :root[data-theme="light"] {

        --chrome-border: #d0d7de;

        --panel-bg: rgba(255, 255, 255, 0.96);
        --panel-solid-bg: #ffffff;

        overflow-wrap: anywhere;
      }
      .approval-actions,
      .approval-edit {
        display: flex;
        gap: 8px;
      }
      .approval-edit {
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .approval-edit[hidden] {
