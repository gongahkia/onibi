<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#282C34">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Onibi">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/icons/onibi-32.png" sizes="32x32" type="image/png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/onibi-192.png">
    <title>Onibi</title>
    <style>
      :root {
        --page-bg: #282C34;
        --page-fg: #FFFFFF;
        --chrome-bg: rgba(40, 44, 52, 0.78);
        --chrome-border: #4a515e;
        --button-bg: #1d1f21;
        --button-fg: #FFFFFF;
        --button-border: #666666;
        --button-active-bg: #7AA6DA;
        --button-active-border: #81A2BE;
        --muted-fg: #C5C8C6;
        --panel-bg: rgba(29, 31, 33, 0.96);
        --panel-solid-bg: #1D1F21;
        --sessions-height: 34px;
        --softkey-height: 88px;
        --visual-viewport-height: 100dvh;
        --keyboard-bottom: 0px;
        --mono-font: "JetBrainsMono Nerd Font", "JetBrainsMono Nerd Font Mono", "JetBrains Mono", Menlo, Monaco, monospace;
      }
      :root[data-theme="dark"] {
        --page-bg: #090b0f;
        --page-fg: #d7dde8;
        --chrome-bg: rgba(9, 11, 15, 0.72);
        --chrome-border: #222a38;
        --button-bg: #151a24;
        --button-fg: #d7dde8;
        --button-border: #303a4d;
        --button-active-bg: #1f6feb;
        --button-active-border: #388bfd;
        --muted-fg: #8d98aa;
        --panel-bg: rgba(13, 17, 23, 0.96);
        --panel-solid-bg: #05070a;
      }
      :root[data-theme="catppuccin-mocha"] {
        --page-bg: #1E1E2E;
        --page-fg: #CDD6F4;
        --chrome-bg: rgba(30, 30, 46, 0.78);
        --chrome-border: #45475A;
        --button-bg: #313244;
        --button-fg: #CDD6F4;
        --button-border: #585B70;
        --button-active-bg: #89B4FA;
        --button-active-border: #89B4FA;
        --muted-fg: #A6ADC8;
        --panel-bg: rgba(17, 17, 27, 0.96);
        --panel-solid-bg: #11111B;
      }
      :root[data-theme="tokyo-night"] {
        --page-bg: #1A1B26;
        --page-fg: #C0CAF5;
        --chrome-bg: rgba(26, 27, 38, 0.78);
        --chrome-border: #414868;
        --button-bg: #15161E;
        --button-fg: #C0CAF5;
        --button-border: #414868;
        --button-active-bg: #7AA2F7;
        --button-active-border: #8DB0FF;
        --muted-fg: #A9B1D6;
        --panel-bg: rgba(21, 22, 30, 0.96);
        --panel-solid-bg: #15161E;
      }
      :root[data-theme="solarized-dark"] {
        --page-bg: #002B36;
        --page-fg: #839496;
        --chrome-bg: rgba(0, 43, 54, 0.78);
        --chrome-border: #073642;
        --button-bg: #073642;
        --button-fg: #EEE8D5;
        --button-border: #335E69;
        --button-active-bg: #268BD2;
        --button-active-border: #2AA198;
        --muted-fg: #93A1A1;
        --panel-bg: rgba(0, 43, 54, 0.96);
        --panel-solid-bg: #073642;
      }
      :root[data-theme="light"] {
        --page-bg: #f6f8fa;
        --page-fg: #18202b;
        --chrome-bg: rgba(246, 248, 250, 0.8);
        --chrome-border: #d0d7de;
        --button-bg: #ffffff;
        --button-fg: #18202b;
        --button-border: #afb8c1;
        --button-active-bg: #0969da;
        --button-active-border: #0969da;
        --muted-fg: #57606a;
        --panel-bg: rgba(255, 255, 255, 0.96);
        --panel-solid-bg: #ffffff;
      }
      html, body, #term {
        width: 100%;
        height: var(--visual-viewport-height, 100dvh);
        margin: 0;
        overflow: hidden;
        background: var(--page-bg);
      }
      body {
        color: var(--page-fg);
        font-family: var(--mono-font);
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      #term {
        box-sizing: border-box;
        padding: calc(env(safe-area-inset-top) + 44px + var(--sessions-height)) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + var(--softkey-height)) env(safe-area-inset-left);
        overscroll-behavior: contain;
        touch-action: none;
      }
      #term .xterm-viewport {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: none;
      }
      #toolbar,
      #softkeys {
        position: fixed;
        left: env(safe-area-inset-left);
        right: env(safe-area-inset-right);
        z-index: 11;
        display: flex;
        align-items: center;
        gap: 8px;
        box-sizing: border-box;
        background: var(--chrome-bg);
        backdrop-filter: blur(12px);
      }
      #toolbar {
        top: env(safe-area-inset-top);
        height: 44px;
        justify-content: flex-end;
        padding: 6px 10px;
        border-bottom: 1px solid var(--chrome-border);
      }
      #softkeys {
        bottom: var(--keyboard-bottom);
        min-height: calc(env(safe-area-inset-bottom) + var(--softkey-height));
        justify-content: flex-start;
        align-content: flex-start;
        flex-wrap: wrap;
        padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
        border-top: 1px solid var(--chrome-border);
        overflow-x: auto;
        overscroll-behavior: contain;
      }
      .control-button,
      .softkey-button,
      .approval-button {
        border: 1px solid var(--button-border);
        border-radius: 2px;
        background: var(--button-bg);
        color: var(--button-fg);
        font: 600 12px var(--mono-font);
        min-height: 30px;
        touch-action: manipulation;
      }
      .control-button,
      .softkey-button {
        min-width: 54px;
      }
      .softkey-button.active {
        background: var(--button-active-bg);
        border-color: var(--button-active-border);
        color: #fff;
      }
      .softkey-paste[hidden] {
        display: none;
      }
      .softkey-view-only {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        box-sizing: border-box;
        border: 1px solid var(--button-active-border);
        border-radius: 2px;
        color: var(--page-fg);
        padding: 0 10px;
        font: 700 12px var(--mono-font);
      }
      .softkey-theme {
        min-width: 104px;
        padding: 0 8px;
      }
      .approval-button {
        padding: 0 10px;
      }
      .approval-button.primary {
        background: #1f6feb;
        border-color: #388bfd;
        color: #fff;
      }
      .approval-button.danger {
        background: #6e1f25;
        border-color: #da3633;
        color: #fff;
      }
      #approval-overlay {
        position: fixed;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: calc(var(--keyboard-bottom) + max(10px, env(safe-area-inset-bottom)) + var(--softkey-height));
        z-index: 10;
        display: grid;
        gap: 8px;
        max-height: min(60dvh, calc(var(--visual-viewport-height) - env(safe-area-inset-top) - var(--softkey-height) - 64px));
        overflow-y: auto;
        overscroll-behavior: contain;
      }
      .approval-card {
        border: 1px solid var(--button-border);
        border-radius: 3px;
        background: var(--panel-bg);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
        padding: 10px;
        animation: approval-slide-in 160ms ease-out;
      }
      .approval-card.risk-high {
        border-color: #da3633;
      }
      .approval-header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px 8px;
        align-items: center;
      }
      .approval-title {
        font: 700 13px var(--mono-font);
        color: var(--page-fg);
      }
      .approval-meta {
        grid-column: 1;
        color: var(--muted-fg);
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .approval-risk {
        grid-column: 2;
        grid-row: 1 / span 2;
        border: 1px solid var(--button-border);
        border-radius: 2px;
        padding: 3px 7px;
        color: var(--page-fg);
        font-size: 11px;
      }
      .approval-input {
        max-height: 26dvh;
        overflow: auto;
        margin: 10px 0;
        padding: 8px;
        background: var(--panel-solid-bg);
        border: 1px solid var(--chrome-border);
        border-radius: 2px;
        color: var(--page-fg);
        font-size: 12px;
        line-height: 1.45;
      }
      .approval-line {
        display: grid;
        grid-template-columns: 3ch 1fr;
        gap: 8px;
      }
      .approval-line-no {
        color: var(--muted-fg);
        text-align: right;
        user-select: none;
      }
      .approval-line code {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .approval-actions,
      .approval-edit {
        display: flex;
        gap: 8px;
      }
      .approval-edit {
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .approval-edit[hidden] {
        display: none;
      }
      .approval-edit textarea {
        flex: 1 0 100%;
        min-height: 120px;
        box-sizing: border-box;
        border: 1px solid var(--button-border);
        border-radius: 2px;
        background: var(--panel-solid-bg);
        color: var(--page-fg);
        font: 12px var(--mono-font);
        padding: 8px;
      }
      .approval-status {
        min-height: 16px;
        margin-top: 6px;
        color: var(--muted-fg);
        font-size: 11px;
      }
      #toast {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 52px);
        left: 50%;
        z-index: 12;
        transform: translateX(-50%);
        border: 1px solid var(--button-border);
        border-radius: 2px;
        background: var(--button-bg);
        color: var(--button-fg);
        padding: 6px 10px;
        font-size: 12px;
        pointer-events: none;
      }
      #toast[hidden] {
        display: none;
      }
      @keyframes approval-slide-in {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .approval-card {
          animation: none;
        }
      }
      #splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--page-bg);
        color: var(--muted-fg);
        font-size: 14px;
        z-index: 2;
      }
      #splash[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="toolbar" aria-label="session controls"></div>
    <main id="session-list" class="session-list-view" aria-label="sessions" hidden></main>
    <div id="sessions" class="sessions-strip" aria-label="sessions" hidden></div>
    <div id="snapshots" class="snapshots-dock" aria-label="snapshots" hidden></div>
    <div id="timeline" class="timeline-dock" aria-label="timeline" hidden></div>
    <div id="files" class="files-dock" aria-label="files" hidden></div>
    <div id="term" aria-label="terminal"></div>
    <div id="softkeys" aria-label="soft keys"></div>
    <div id="approval-overlay" aria-live="polite"></div>
    <div id="toast" role="status" hidden></div>
    <div id="splash">loading...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
