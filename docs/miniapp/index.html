<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Onibi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{color-scheme:light dark;--bg:#f6f7f9;--fg:#111827;--muted:#5b6573;--line:#d6dbe3;--panel:#fff;--ok:#0f766e;--danger:#b91c1c;--warn:#b45309}
    @media (prefers-color-scheme:dark){:root{--bg:#111418;--fg:#eceff3;--muted:#a5adba;--line:#343a46;--panel:#181d24}}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}
    main{max-width:760px;margin:0 auto;padding:16px}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    h1{font-size:18px;line-height:1.2;margin:0}
    .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 8px;white-space:nowrap}
    pre{white-space:pre-wrap;word-break:break-word;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px;margin:12px 0;max-height:58vh;overflow:auto}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    button{appearance:none;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--fg);padding:10px 12px;font-weight:600;min-height:42px}
    button.primary{background:var(--ok);border-color:var(--ok);color:white}
    button.danger{background:var(--danger);border-color:var(--danger);color:white}
    button.warn{background:var(--warn);border-color:var(--warn);color:white}
    button:disabled{opacity:.5}
    textarea{width:100%;min-height:170px;resize:vertical;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--fg);padding:10px;font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace}
    select,input[type=file]{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--fg);padding:10px;min-height:42px}
    img{max-width:100%;height:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel)}
    section{margin:12px 0}
    .muted{color:var(--muted)}
    .hidden{display:none}
  </style>
</head>
<body>
<main>
  <div class="bar">
    <h1>Onibi</h1>
    <span id="state" class="pill">loading</span>
  </div>
  <p id="notice" class="muted"></p>
  <pre id="body"></pre>
  <img id="itemImage" class="hidden" alt="">
  <section id="importBox" class="hidden">
    <textarea id="importText" spellcheck="false" placeholder="Paste .enc ciphertext"></textarea>
    <div class="row">
      <input id="importFile" type="file" accept=".enc,text/plain">
      <button id="decryptImport" class="primary">Decrypt</button>
    </div>
  </section>
  <section id="secureBox" class="hidden">
    <select id="sessionSelect"></select>
    <textarea id="promptText" spellcheck="true" placeholder="Prompt"></textarea>
    <div class="row">
      <button id="sendPrompt" class="primary">Send prompt</button>
      <button id="interruptSession">Interrupt</button>
      <button id="killSession" class="danger">Kill</button>
    </div>
  </section>
  <section id="editBox" class="hidden">
    <textarea id="editText" spellcheck="false"></textarea>
  </section>
  <div class="row">
    <button id="approve" class="primary" disabled>Approve</button>
    <button id="deny" class="danger" disabled>Deny</button>
    <button id="edit" disabled>Edit</button>
    <button id="sendEdit" class="primary hidden">Send edit</button>
  </div>
</main>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
const state = document.getElementById("state");
const notice = document.getElementById("notice");
const body = document.getElementById("body");
const itemImage = document.getElementById("itemImage");
const importBox = document.getElementById("importBox");
const importText = document.getElementById("importText");
const importFile = document.getElementById("importFile");
const decryptImport = document.getElementById("decryptImport");
const secureBox = document.getElementById("secureBox");
const sessionSelect = document.getElementById("sessionSelect");
const promptText = document.getElementById("promptText");
const sendPrompt = document.getElementById("sendPrompt");
const interruptSession = document.getElementById("interruptSession");
const killSession = document.getElementById("killSession");
const approve = document.getElementById("approve");
const deny = document.getElementById("deny");
const edit = document.getElementById("edit");
const sendEdit = document.getElementById("sendEdit");
const editBox = document.getElementById("editBox");
const editText = document.getElementById("editText");
let current = null;
let confirmArmed = false;

function b64urlToBytes(s){
  s = (s || "").replace(/-/g,"+").replace(/_/g,"/");
  while(s.length % 4) s += "=";
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function bytesToB64url(b){
  let bin = "";
  for(const x of b) bin += String.fromCharCode(x);
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function bytesToText(b){ return new TextDecoder().decode(b); }
function utf8(s){ return new TextEncoder().encode(s); }
function hashParams(){ return new URLSearchParams(location.hash.replace(/^#/,"")); }
function setState(s){ state.textContent = s; }
function setNotice(s){ notice.textContent = s || ""; }
function storage(){
  const ss = tg && tg.SecureStorage;
  if(ss && ss.getItem && ss.setItem){
    return {
      secure:true,
      get:k=>new Promise((res,rej)=>ss.getItem(k,(e,v)=>e?rej(e):res(v))),
      set:(k,v)=>new Promise((res,rej)=>ss.setItem(k,v,(e,ok)=>e?rej(e):res(ok)))
    };
  }
  throw new Error("SecureStorage unavailable. Open inside a current Telegram client.");
}
async function importSeed(seed){
  if(b64urlToBytes(seed).length !== 32) throw new Error("bad seed length");
  await storage().set("onibi_seed", seed);
}
async function deriveKey(seed, usages){
  const keymat = await crypto.subtle.importKey("raw", b64urlToBytes(seed), "HKDF", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({
    name:"HKDF",
    hash:"SHA-256",
    salt:utf8("onibi-envelope-v1"),
    info:utf8("telegram-mini-app")
  }, keymat, {name:"AES-GCM", length:256}, false, usages);
}
async function decryptToken(seed, token){
  const raw = JSON.parse(bytesToText(b64urlToBytes(token.trim())));
  if(raw.v !== 1) throw new Error("unsupported envelope");
  if(raw.exp && Date.now()/1000 >= raw.exp) throw new Error("expired");
  const key = await deriveKey(seed, ["decrypt"]);
  const aad = utf8(`v=1;kind=${raw.kind};exp=${raw.exp}`);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64urlToBytes(raw.nonce), additionalData:aad}, key, b64urlToBytes(raw.ct));
  return JSON.parse(bytesToText(new Uint8Array(pt)));
}
async function encryptPlain(seed, kind, plain, ttlSeconds){
  const exp = Math.floor(Date.now()/1000) + ttlSeconds;
  plain.v = 1;
  plain.kind = kind;
  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(seed, ["encrypt"]);
  const aad = utf8(`v=1;kind=${kind};exp=${exp}`);
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv:nonce, additionalData:aad}, key, utf8(JSON.stringify(plain)));
  return bytesToB64url(utf8(JSON.stringify({
    v:1,
    kind,
    exp,
    nonce:bytesToB64url(nonce),
    ct:bytesToB64url(new Uint8Array(ct))
  })));
}
async function send(action, extra){
  if(!current) return;
  if(!tg || !tg.sendData){
    setNotice("Telegram bridge unavailable.");
    return;
  }
  const seed = await storage().get("onibi_seed");
  if(!seed) throw new Error("seed missing");
  const payload = Object.assign({v:1, action, id:current.id || ""}, extra || {});
  if(action === "edit") payload.updated_input = editText.value;
  const token = await encryptPlain(seed, "action", {kind:"action", body:JSON.stringify(payload)}, 300);
  tg.sendData(JSON.stringify({v:1, envelope:token}));
  tg.close();
}
function resetViews(){
  importBox.classList.add("hidden");
  secureBox.classList.add("hidden");
  editBox.classList.add("hidden");
  sendEdit.classList.add("hidden");
  itemImage.classList.add("hidden");
  itemImage.removeAttribute("src");
  approve.disabled = deny.disabled = edit.disabled = true;
  approve.textContent = "Approve";
  approve.className = "primary";
  confirmArmed = false;
}
function armActions(){
  approve.disabled = deny.disabled = edit.disabled = false;
  approve.onclick = () => {
    if(current.risk === "high" && !confirmArmed){
      confirmArmed = true;
      approve.textContent = "Confirm approve";
      approve.className = "warn";
      return;
    }
    send(current.risk === "high" ? "confirm_approve" : "approve").catch(showError);
  };
  deny.onclick = () => send("deny").catch(showError);
  edit.onclick = () => {
    editBox.classList.remove("hidden");
    sendEdit.classList.remove("hidden");
    editText.focus();
  };
  sendEdit.onclick = () => send("edit").catch(showError);
}
function renderSecure(){
  let ctx = {sessions:[]};
  try{ ctx = JSON.parse(current.body || "{}"); }catch(_){}
  sessionSelect.innerHTML = "";
  for(const s of ctx.sessions || []){
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.label || s.id;
    sessionSelect.appendChild(opt);
  }
  secureBox.classList.remove("hidden");
  body.textContent = sessionSelect.options.length ? "Encrypted controls ready." : "No active sessions.";
  const selected = () => sessionSelect.value || "";
  sendPrompt.onclick = () => send("prompt", {session:selected(), text:promptText.value}).catch(showError);
  interruptSession.onclick = () => send("interrupt", {session:selected()}).catch(showError);
  killSession.onclick = () => send("kill", {session:selected()}).catch(showError);
}
function renderCurrent(){
  resetViews();
  setState(current.risk === "high" ? "high risk" : "ready");
  body.textContent = current.body || "";
  editText.value = "";
  if(current.mime && current.mime.startsWith("image/") && current.data_b64){
    itemImage.src = `data:${current.mime};base64,${current.data_b64}`;
    itemImage.classList.remove("hidden");
  }
  if(current.kind === "approval") armActions();
  if(current.kind === "secure") renderSecure();
}
async function loadToken(token){
  const seed = await storage().get("onibi_seed");
  if(!seed) throw new Error("seed missing");
  current = await decryptToken(seed, token);
  renderCurrent();
}
function showImport(){
  resetViews();
  importBox.classList.remove("hidden");
  setState("idle");
  body.textContent = "Paste or import an Onibi ciphertext.";
}
function showError(err){
  setState("error");
  body.textContent = err && err.message ? err.message : String(err);
}
async function main(){
  if(tg){ tg.ready(); tg.expand(); }
  const sp = hashParams();
  const seedParam = sp.get("seed");
  if(seedParam){
    await importSeed(seedParam);
    setState("seed stored");
    body.textContent = "Seed imported.";
    return;
  }
  const token = sp.get("onibi");
  if(!token){
    showImport();
    return;
  }
  await loadToken(token);
}
decryptImport.onclick = () => loadToken(importText.value).catch(showError);
importFile.onchange = async () => {
  const f = importFile.files && importFile.files[0];
  if(!f) return;
  importText.value = await f.text();
  loadToken(importText.value).catch(showError);
};
main().catch(err => {
  showError(err);
});
</script>
</body>
</html>
