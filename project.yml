name: Onibi
options:
  createIntermediateGroups: true
packages:
  OnibiPackage:
    path: .
targets:
  OnibiPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - OnibiPhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.onibi.phone
        PRODUCT_NAME: OnibiPhone
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Onibi
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OnibiPackage
        product: OnibiCore
  OnibiPhoneTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - OnibiPhoneTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gongahkia.onibi.phone.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: OnibiPackage
        product: OnibiCore
