# goreleaser config — phase 0 stub. Phase 9 wires in codesign + notarize via
# mitchellh/gon and the Homebrew tap publish step. See TODO §8 Phase 9.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: onibi
    main: ./cmd/onibi
    binary: onibi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: onibi-notify
    main: ./clients/onibi-notify
    binary: onibi-notify
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/security.md
      - docs/release.md
      - scripts/manual-e2e-*.md
      - packaging/homebrew/onibi.rb.template

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

notarize:
  macos:
    - enabled: '{{ and (isEnvSet "MACOS_SIGN_P12") (ne .Env.MACOS_SIGN_P12 "") }}'
      ids:
        - onibi
        - onibi-notify
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

