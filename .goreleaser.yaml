version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: onibi
    main: ./cmd/onibi
    binary: onibi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/gongahkia/onibi/internal/buildinfo.Version={{.Version}}
      - -X github.com/gongahkia/onibi/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/gongahkia/onibi/internal/buildinfo.Date={{.Date}}

  - id: onibi-notify
    main: ./clients/onibi-notify
    binary: onibi-notify
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/security.md
      - docs/troubleshooting.md
      - docs/release.md
      - scripts/manual-e2e-*.md
      - packaging/homebrew/onibi.rb.template

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

notarize:
  macos:
    - enabled: '{{ and (isEnvSet "MACOS_SIGN_P12") (ne .Env.MACOS_SIGN_P12 "") }}'
      ids:
        - onibi
        - onibi-notify
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

snapshot:
  version_template: "2.0.0-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: onibi
    ids:
      - default
    binaries:
      - onibi
      - onibi-notify
    repository:
      owner: gongahkia
      name: homebrew-onibi
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/gongahkia/onibi
    description: "Telegram-controlled coding-agent host"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
