name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release ${{ matrix.target-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-name: darwin-x86_64
            os: macos-14
            rust-target: x86_64-apple-darwin
            bundles: dmg
          - target-name: darwin-aarch64
            os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: dmg
          - target-name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - target-name: linux-aarch64
            os: ubuntu-22.04
            rust-target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev gcc-aarch64-linux-gnu
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Tauri bundle
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: pnpm --filter onibi-app tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}
      - name: Stage release assets
        run: |
          mkdir -p release
          find app/src-tauri/target -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) -print0 | while IFS= read -r -d '' file; do
            ext="${file##*.}"
            cp "$file" "release/onibi-${GITHUB_REF_NAME}-${{ matrix.target-name }}.${ext}"
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
