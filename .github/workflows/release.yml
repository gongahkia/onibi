name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  headless-smoke:
    name: headless smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: Build headless without GUI dependencies
        run: cargo build --manifest-path app/src-tauri/Cargo.toml --release --no-default-features
      - name: Smoke /v1/status authentication
        shell: bash
        run: |
          set -euo pipefail
          export ONIBI_CONFIG_DIR="$(mktemp -d)"
          export ONIBI_DISABLE_KEYRING=1
          BIN="app/src-tauri/target/release/onibi"
          TOKEN="$("$BIN" --port 17894 token show)"
          "$BIN" --headless --port 17894 >headless.log 2>&1 &
          PID="$!"
          trap 'kill "$PID" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            curl -fsS http://127.0.0.1:17894/healthz >/dev/null && break
            sleep 1
          done
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:17894/v1/status)" = "401"
          curl -fsS -H "Authorization: Bearer ${TOKEN}" http://127.0.0.1:17894/v1/status >/tmp/onibi-status.json
          grep -q '"ok":true' /tmp/onibi-status.json
      - name: Install cross
        run: cargo install cross --locked
      - name: Cross-build Pi headless binary
        run: cross build --manifest-path app/src-tauri/Cargo.toml --release --target aarch64-unknown-linux-gnu --no-default-features
        env:
          ONIBI_HEADLESS_UPDATE_PUBLIC_KEY: ${{ vars.HEADLESS_UPDATE_PUBLIC_KEY || secrets.HEADLESS_UPDATE_PUBLIC_KEY }}

  build-gui:
    name: build ${{ matrix.target-name }}
    needs: headless-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-name: darwin-x86_64
            os: macos-13
            rust-target: x86_64-apple-darwin
            bundles: dmg
            asset-suffix: x86_64
          - target-name: darwin-aarch64
            os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: dmg
            asset-suffix: aarch64
          - target-name: linux-x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            asset-suffix: linux-x86_64
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure updater signing
        shell: bash
        env:
          ONIBI_TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${ONIBI_TAURI_UPDATER_PUBLIC_KEY}" || { echo "missing Tauri updater public key"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY}" || { echo "missing Tauri updater private key"; exit 1; }
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("app/src-tauri/tauri.conf.json")
          config = json.loads(path.read_text())
          config.setdefault("plugins", {}).setdefault("updater", {})["pubkey"] = os.environ[
              "ONIBI_TAURI_UPDATER_PUBLIC_KEY"
          ]
          path.write_text(json.dumps(config, indent=2) + "\n")
          PY
      - name: Build Tauri bundle
        run: pnpm --filter onibi-app tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Build Linux x86_64 headless installer binary
        if: matrix.target-name == 'linux-x86_64'
        run: |
          set -euo pipefail
          test -n "${ONIBI_HEADLESS_UPDATE_PUBLIC_KEY}" || { echo "missing headless update public key"; exit 1; }
          cargo build --manifest-path app/src-tauri/Cargo.toml --release --no-default-features
        env:
          ONIBI_HEADLESS_UPDATE_PUBLIC_KEY: ${{ vars.HEADLESS_UPDATE_PUBLIC_KEY || secrets.HEADLESS_UPDATE_PUBLIC_KEY }}
      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#v}"
          find app/src-tauri/target -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.deb" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -print0 | while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            case "$base" in
              *.app.tar.gz.sig) name="Onibi-${VERSION}-${{ matrix.asset-suffix }}.app.tar.gz.sig" ;;
              *.app.tar.gz) name="Onibi-${VERSION}-${{ matrix.asset-suffix }}.app.tar.gz" ;;
              *.AppImage.sig) name="Onibi-${VERSION}-linux-x86_64.AppImage.sig" ;;
              *.AppImage) name="Onibi-${VERSION}-linux-x86_64.AppImage" ;;
              *.dmg) name="Onibi-${VERSION}-${{ matrix.asset-suffix }}.dmg" ;;
              *.deb) name="Onibi-${VERSION}-linux-x86_64.deb" ;;
              *) name="$base" ;;
            esac
            cp "$file" "release/$name"
          done
          if [ "${{ matrix.target-name }}" = "linux-x86_64" ]; then
            cp app/src-tauri/target/release/onibi "release/onibi-headless-${VERSION}-linux-x86_64"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target-name }}
          path: release/*
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*

  build-linux-arm64-headless:
    name: build linux-arm64 headless
    needs: headless-smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: Install cross
        run: cargo install cross --locked
      - name: Cross-build Pi headless binary
        run: |
          set -euo pipefail
          test -n "${ONIBI_HEADLESS_UPDATE_PUBLIC_KEY}" || { echo "missing headless update public key"; exit 1; }
          cross build --manifest-path app/src-tauri/Cargo.toml --release --target aarch64-unknown-linux-gnu --no-default-features
        env:
          ONIBI_HEADLESS_UPDATE_PUBLIC_KEY: ${{ vars.HEADLESS_UPDATE_PUBLIC_KEY || secrets.HEADLESS_UPDATE_PUBLIC_KEY }}
      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/src-tauri/target/aarch64-unknown-linux-gnu/release/onibi "release/onibi-headless-${VERSION}-linux-arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64-headless
          path: release/*
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*

  publish-update-metadata:
    name: publish update metadata
    needs:
      - build-gui
      - build-linux-arm64-headless
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-input
      - name: Generate updater manifests
        shell: bash
        env:
          ONIBI_HEADLESS_SIGNING_KEY: ${{ secrets.HEADLESS_UPDATE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          test -n "${ONIBI_HEADLESS_SIGNING_KEY}" || { echo "missing headless update signing key"; exit 1; }
          mkdir -p metadata
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          ASSET_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          export VERSION RELEASE_URL ASSET_BASE
          printf '%s' "${ONIBI_HEADLESS_SIGNING_KEY}" > headless-update.key
          chmod 600 headless-update.key
          for binary in release-input/onibi-headless-"${VERSION}"-*; do
            openssl dgst -sha256 -sign headless-update.key -out "${binary}.sig" "${binary}"
          done
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const crypto = require("crypto");

          const version = process.env.VERSION;
          const releaseUrl = process.env.RELEASE_URL;
          const assetBase = process.env.ASSET_BASE;
          const files = fs.readdirSync("release-input").sort();

          function requireFile(name) {
            if (!files.includes(name)) {
              throw new Error(`missing release artifact ${name}`);
            }
            return path.join("release-input", name);
          }

          function signature(name) {
            return fs.readFileSync(requireFile(`${name}.sig`), "utf8").trim();
          }

          function url(name) {
            return `${assetBase}/${encodeURIComponent(name)}`;
          }

          const latest = {
            version,
            notes: `See ${releaseUrl}`,
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-x86_64": {
                url: url(`Onibi-${version}-x86_64.app.tar.gz`),
                signature: signature(`Onibi-${version}-x86_64.app.tar.gz`),
              },
              "darwin-aarch64": {
                url: url(`Onibi-${version}-aarch64.app.tar.gz`),
                signature: signature(`Onibi-${version}-aarch64.app.tar.gz`),
              },
              "linux-x86_64": {
                url: url(`Onibi-${version}-linux-x86_64.AppImage`),
                signature: signature(`Onibi-${version}-linux-x86_64.AppImage`),
              },
            },
          };

          function sha256(name) {
            return crypto
              .createHash("sha256")
              .update(fs.readFileSync(requireFile(name)))
              .digest("hex");
          }

          function headlessSignature(name) {
            return fs.readFileSync(requireFile(`${name}.sig`)).toString("base64");
          }

          const headless = {
            version,
            pubDate: latest.pub_date,
            notes: latest.notes,
            releaseUrl,
            assets: {
              "linux-x86_64": {
                url: url(`onibi-headless-${version}-linux-x86_64`),
                sha256: sha256(`onibi-headless-${version}-linux-x86_64`),
                signature: headlessSignature(`onibi-headless-${version}-linux-x86_64`),
              },
              "linux-aarch64": {
                url: url(`onibi-headless-${version}-linux-arm64`),
                sha256: sha256(`onibi-headless-${version}-linux-arm64`),
                signature: headlessSignature(`onibi-headless-${version}-linux-arm64`),
              },
            },
          };

          fs.writeFileSync("metadata/latest.json", JSON.stringify(latest, null, 2) + "\n");
          fs.writeFileSync(
            "metadata/latest-headless.json",
            JSON.stringify(headless, null, 2) + "\n",
          );
          NODE
      - uses: softprops/action-gh-release@v3
        with:
          files: metadata/*
