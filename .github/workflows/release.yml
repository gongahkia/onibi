name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: require macOS signing secrets
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          test -n "$MACOS_SIGN_P12"
          test -n "$MACOS_SIGN_PASSWORD"
          test -n "$MACOS_NOTARY_ISSUER_ID"
          test -n "$MACOS_NOTARY_KEY_ID"
          test -n "$MACOS_NOTARY_KEY"
          test -n "$HOMEBREW_TAP_TOKEN"
          test -n "$GPG_PRIVATE_KEY"
          test -n "$GPG_PASSPHRASE"
      - name: install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: install cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: import gpg key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: export gpg public key
        id: export_gpg_public_key
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          key="$(gpg --armor --export "$GPG_FINGERPRINT" | base64 | tr -d '\n')"
          test -n "$key"
          echo "key_b64=$key" >> "$GITHUB_OUTPUT"
      - id: run-goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PUBLIC_KEY_B64: ${{ steps.export_gpg_public_key.outputs.key_b64 }}
          # Public tags require Apple signing/notarization and tap publish secrets.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      - name: generate SLSA subjects
        id: hash
        env:
          ARTIFACTS: ${{ steps.run-goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail
          hashes="$(printf '%s' "$ARTIFACTS" | jq --raw-output '.[] | {name, "digest": (.extra.Digest // .extra.Checksum)} | select(.digest) | {digest} + {name} | join("  ") | sub("^sha256:";"")' | base64 | tr -d '\n')"
          if test -z "$hashes"; then
            checksum_file="$(printf '%s' "$ARTIFACTS" | jq -r '.[] | select(.type=="Checksum") | .path' | head -n 1)"
            test -n "$checksum_file"
            hashes="$(base64 < "$checksum_file" | tr -d '\n')"
          fi
          test -n "$hashes"
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [goreleaser]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
