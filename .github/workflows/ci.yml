name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: go vet
        run: go vet $(scripts/go-packages.sh)
      - name: go test
        run: go test -race -count=1 $(scripts/go-packages.sh)

  linux-beta:
    name: linux beta matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: run Linux beta smoke
        run: scripts/linux-beta-smoke.sh "$RUNNER_TEMP/onibi-linux-beta"
      - name: upload Linux beta evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-beta-evidence
          path: ${{ runner.temp }}/onibi-linux-beta
          if-no-files-found: error

  macos-release-gate:
    name: macOS release gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: run macOS release gate
        run: scripts/macos-release-gate.sh "$RUNNER_TEMP/onibi-macos-release"
      - name: run macOS scenario gate
        run: scripts/macos-scenario-gate.sh "$RUNNER_TEMP/onibi-macos-release/scenarios"
      - name: upload macOS release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-evidence
          path: ${{ runner.temp }}/onibi-macos-release
          if-no-files-found: error

  lint:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: run staticcheck
        run: staticcheck $(scripts/go-packages.sh)

  security-regression:
    name: security regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: run security regression gate
        run: scripts/security-regression-gate.sh "$RUNNER_TEMP/onibi-security-regression"
      - name: upload security regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-regression-evidence
          path: ${{ runner.temp }}/onibi-security-regression
          if-no-files-found: error

  frontend:
    name: frontend smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install frontend deps
        run: npm ci
        working-directory: frontend
      - name: bun test
        run: bun test --coverage
        working-directory: frontend

  frontend-lint:
    name: frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install frontend deps
        run: npm ci
        working-directory: frontend
      - name: lint
        run: bun run lint
        working-directory: frontend
      - name: format check
        run: bun run format:check
        working-directory: frontend

  readme:
    name: readme up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: check generated README blocks
        run: make gen-readme-check
      - name: check generated documentation pages
        run: make docs-pages-check
      - name: check fresh-machine smoke doc
        run: make fresh-machine-doc-check

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck $(scripts/go-packages.sh)

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: build all targets
        run: |
          go build -o /tmp/onibi ./cmd/onibi
          go build -o /tmp/onibi-notify ./clients/onibi-notify

  runtime-deps:
    name: no runtime dependency downloads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: install trace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ncurses-bin strace tmux
      - name: build audit binary
        run: go build -o /tmp/onibi ./cmd/onibi
      - name: audit onibi up
        env:
          ONIBI_BINARY: /tmp/onibi
          ONIBI_RUNTIME_AUDIT_SECONDS: 30
        run: scripts/no-runtime-deps-check.sh

  release-smoke:
    name: release smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --skip=sign
      - name: smoke artifacts
        run: scripts/release-smoke.sh dist

  reproducible-build:
    name: reproducible build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true
      - name: compare fixed-input builds
        run: scripts/reproducible-build.sh

  benchmark-tolerance:
    name: benchmark tolerance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: rerun local benchmarks
        env:
          ONIBI_BENCH_COUNT: 10
          ONIBI_BENCH_APPROVAL_COUNT: 20
          ONIBI_BENCH_RSS_TOLERANCE_MIB: 5
        run: make bench-tolerance
